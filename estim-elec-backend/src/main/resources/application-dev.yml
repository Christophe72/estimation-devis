server:
  port: 9090

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/estim_elec
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  sql:
    init:
      mode: never

logging:
  level:
    org.flywaydb: info
    org.hibernate.SQL: info

app:
  security:
    jwt:
      secret: "c3VwZXItc2VjcmV0LWtleS1mb3ItanNvbndlYnRva2VuLWRldi0xMjM0NTY3ODkw"
      expiration: 3600
